<!DOCTYPE html>

<html lang="bs">
<head>
<meta charset="UTF-8">
<title>StudyTrack PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 800px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 25px;
}

h1 {
    text-align: center;
    font-size: 32px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
}

input, button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 5px;
}

button {
    background: #2ecc71;
    color: white;
    cursor: pointer;
}

.logout { background: #e74c3c; }

.top-bar {
    display: flex;
    gap: 10px;
}

.top-bar input {
    flex: 1;
}

.task {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin: 8px 0;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
}

.completed {
    text-decoration: line-through;
    opacity: 0.5;
}

.stats {
    text-align: center;
    margin-top: 10px;
    font-size: 18px;
}

.history-item {
    border-left: 3px solid #2ecc71;
    padding-left: 10px;
    margin: 5px 0;
}
</style>

</head>

<body>

<div class="container">

<h1>📘 StudyTrack</h1>

<div id="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<button class="logout" onclick="logout()">Logout</button>

<div class="top-bar">
<input id="taskInput" placeholder="Zadatak">
<input type="datetime-local" id="taskTime">
<button onclick="addTask()">➕</button>
</div>

<!-- RED 1 -->

<div class="card">
<canvas id="chart"></canvas>
<div class="stats">
Završeno: <span id="done">0</span> |
Preostalo: <span id="left">0</span> |
Procenat: <span id="percent">0%</span>
</div>
</div>

<!-- RED 2 -->

<div class="card">
<h3>📋 Zadaci</h3>
<div id="taskList"></div>
</div>

<!-- RED 3 -->

<div class="card">
<h3>📜 History</h3>
<div id="historyList"></div>
</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAacLUBW1jTTq09ZG1AsxHgJ69F5W9TgdM",
  authDomain: "study-truck.firebaseapp.com",
  projectId: "study-truck",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.auth = auth;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.signOut = signOut;
</script>

<script>
let tasks=[];
let currentUser=null;

// 🔔 TRAŽI DOZVOLU
if(Notification.permission !== "granted"){
    Notification.requestPermission();
}

function register(){
    createUserWithEmailAndPassword(auth,email.value,password.value)
    .then(res=>{currentUser=res.user;showApp();})
    .catch(e=>alert(e.message));
}

function login(){
    signInWithEmailAndPassword(auth,email.value,password.value)
    .then(res=>{currentUser=res.user;showApp();})
    .catch(e=>alert(e.message));
}

function logout(){signOut(auth);location.reload();}

function showApp(){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadTasks();
}

function loadTasks(){
    tasks=JSON.parse(localStorage.getItem("tasks_"+currentUser.uid))||[];
    render();
}

function saveTasks(){
    localStorage.setItem("tasks_"+currentUser.uid,JSON.stringify(tasks));
}

function addTask(){
    if(!taskInput.value)return;

    tasks.push({
        text:taskInput.value,
        time:taskTime.value,
        done:false,
        notified:false
    });

    saveTasks();
    render();
}

function toggle(i){
    tasks[i].done=!tasks[i].done;
    saveTasks();
    render();
}

function del(i){
    tasks.splice(i,1);
    saveTasks();
    render();
}

function render(){
    let list=document.getElementById("taskList");
    let history=document.getElementById("historyList");

    list.innerHTML="";
    history.innerHTML="";

    let done=0;

    tasks.forEach((t,i)=>{
        let div=document.createElement("div");
        div.className="task";

        if(t.done){div.classList.add("completed");done++;}

        div.innerHTML=t.text;

        div.onclick=()=>toggle(i);

        let b=document.createElement("button");
        b.innerText="❌";
        b.onclick=(e)=>{e.stopPropagation();del(i);};

        div.appendChild(b);
        list.appendChild(div);

        if(t.done){
            let h=document.createElement("div");
            h.className="history-item";
            h.innerText="✔ "+t.text;
            history.appendChild(h);
        }
    });

    updateStats(done,tasks.length);
    drawChart(done,tasks.length);
}

function updateStats(done,total){
    let left = total - done;
    let percent = total === 0 ? 0 : Math.round((done/total)*100);

    document.getElementById("done").innerText = done;
    document.getElementById("left").innerText = left;
    document.getElementById("percent").innerText = percent + "%";
}

function drawChart(done,total){
    let ctx=document.getElementById("chart");

    if(window.myChart)window.myChart.destroy();

    window.myChart=new Chart(ctx,{
        type:'doughnut',
        data:{
            labels:['Završeno','Nezavršeno'],
            datasets:[{
                data:[done,total-done],
                backgroundColor:['#2ecc71','#e74c3c']
            }]
        }
    });
}

// 🔔 POUZDANI REMINDER
function checkReminders(){
    let now = new Date();

    tasks.forEach(t=>{
        if(!t.time || t.done || t.notified) return;

        let taskTime = new Date(t.time);
        let diff = (taskTime - now) / 1000;

        if(diff <= 0 && diff > -60){
            if(Notification.permission === "granted"){
                new Notification("⏰ " + t.text);
            } else {
                alert("⏰ " + t.text);
            }

            t.notified = true;
            saveTasks();
        }
    });
}

setInterval(checkReminders,10000);
</script>

</body>
</html>
