<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTrack App</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1e3c;
    color:white;
}
.app {
    max-width:400px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
}
header {
    background:#122b50;
    text-align:center;
    padding:15px;
}
main {
    flex:1;
    overflow-y:auto;
    padding:10px;
}
.card {
    background:#122b50;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}
input, button {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:10px;
    border:none;
}
button {
    background:#2ecc71;
    color:white;
}
ul {list-style:none;padding:0;}
li {
    background:#1c3b6e;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}
.completed {
    text-decoration:line-through;
    opacity:0.6;
}
nav {
    display:flex;
    background:#122b50;
}
nav button {
    flex:1;
    background:none;
    font-size:20px;
    color:white;
}

/* KALENDAR */
.calendar-header {
    display:flex;
    justify-content:space-between;
}
table {width:100%;}
td {
    padding:8px;
    text-align:center;
    background:#1c3b6e;
    border-radius:5px;
    cursor:pointer;
}
.hasTask {background:#f39c12;color:black;}
.selected {outline:2px solid #2ecc71;}
</style>
</head>

<body>

<div class="app">
<header><h2>StudyTrack</h2></header>

<main>

<!-- TASKS -->
<section class="card">
<h3>Zadaci</h3>
<input id="taskInput" placeholder="Novi zadatak">
<button onclick="addTask()">Dodaj</button>
<ul id="taskList"></ul>
<p>✔ <span id="done">0</span> / <span id="total">0</span></p>
</section>

<!-- KALENDAR -->
<section class="card">
<h3>Kalendar</h3>
<div class="calendar-header">
<button onclick="changeMonth(-1)">◀</button>
<span id="month"></span>
<button onclick="changeMonth(1)">▶</button>
</div>
<table><tbody id="cal"></tbody></table>

<h4 id="selDate">Izaberi datum</h4>
<input id="planText" placeholder="Obaveza">
<button onclick="addPlan()">Dodaj</button>
<ul id="planList"></ul>
</section>

<!-- PODSJETNICI -->
<section class="card">
<h3>Podsjetnici</h3>
<input id="remText" placeholder="Podsjetnik">
<input type="datetime-local" id="remTime">
<button onclick="addReminder()">Dodaj</button>
<ul id="remList"></ul>
</section>

<!-- STATISTIKA -->
<section class="card">
<h3>Statistika</h3>
<p>Ukupno zadataka: <span id="statTotal">0</span></p>
<p>Završeno: <span id="statDone">0</span></p>
<p>Procenat: <span id="statPerc">0%</span></p>
</section>

</main>

<nav>
<button onclick="show(0)">📋</button>
<button onclick="show(1)">📅</button>
<button onclick="show(2)">🔔</button>
<button onclick="show(3)">📊</button>
</nav>
</div>

<script>

/* NAV */
const sections=document.querySelectorAll(".card");
function show(i){
    sections.forEach((s,index)=>s.style.display=index===i?"block":"none");
}
show(0);

/* TASKS */
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function addTask(){
    let t=document.getElementById("taskInput").value;
    if(!t) return;
    tasks.push({text:t,done:false});
    saveTasks();
}

function toggleTask(i){
    tasks[i].done=!tasks[i].done;
    saveTasks();
}

function saveTasks(){
    localStorage.setItem("tasks",JSON.stringify(tasks));
    renderTasks();
}

function renderTasks(){
    let ul=document.getElementById("taskList");
    ul.innerHTML="";
    let done=0;
    tasks.forEach((t,i)=>{
        let li=document.createElement("li");
        li.innerHTML=`${t.text}`;
        if(t.done){li.classList.add("completed");done++;}
        li.onclick=()=>toggleTask(i);
        ul.appendChild(li);
    });
    document.getElementById("done").textContent=done;
    document.getElementById("total").textContent=tasks.length;

    // statistika
    document.getElementById("statTotal").textContent=tasks.length;
    document.getElementById("statDone").textContent=done;
    document.getElementById("statPerc").textContent=
        tasks.length?Math.round(done/tasks.length*100)+"%":"0%";
}

/* KALENDAR */
let date=new Date();
let selected=null;
let plans=JSON.parse(localStorage.getItem("plans"))||{};

function renderCal(){
    let cal=document.getElementById("cal");
    cal.innerHTML="";
    let y=date.getFullYear();
    let m=date.getMonth();

    document.getElementById("month").textContent=`${m+1}.${y}`;

    let first=new Date(y,m,1).getDay();
    let days=new Date(y,m+1,0).getDate();
    let start=(first===0?6:first-1);

    let row=document.createElement("tr");

    for(let i=0;i<start;i++) row.appendChild(document.createElement("td"));

    for(let d=1;d<=days;d++){
        if(row.children.length===7){
            cal.appendChild(row);
            row=document.createElement("tr");
        }

        let td=document.createElement("td");
        td.textContent=d;
        let full=`${y}-${m+1}-${d}`;

        if(plans[full]) td.classList.add("hasTask");

        td.onclick=()=>selectDate(full,td);
        row.appendChild(td);
    }

    cal.appendChild(row);
}

function changeMonth(x){
    date.setMonth(date.getMonth()+x);
    renderCal();
}

function selectDate(f,el){
    selected=f;
    document.querySelectorAll("td").forEach(td=>td.classList.remove("selected"));
    el.classList.add("selected");
    document.getElementById("selDate").textContent=f;
    renderPlans();
}

function addPlan(){
    let t=document.getElementById("planText").value;
    if(!selected||!t) return;

    if(!plans[selected]) plans[selected]=[];
    plans[selected].push(t);

    localStorage.setItem("plans",JSON.stringify(plans));
    renderCal();
    renderPlans();
}

function renderPlans(){
    let ul=document.getElementById("planList");
    ul.innerHTML="";
    if(!plans[selected]) return;

    plans[selected].forEach(p=>{
        let li=document.createElement("li");
        li.textContent=p;
        ul.appendChild(li);
    });
}

/* PODSJETNICI */
let reminders=JSON.parse(localStorage.getItem("rem"))||[];

if("Notification" in window) Notification.requestPermission();

function addReminder(){
    let t=document.getElementById("remText").value;
    let time=document.getElementById("remTime").value;
    if(!t||!time) return;

    reminders.push({text:t,time:new Date(time).getTime(),shown:false});
    localStorage.setItem("rem",JSON.stringify(reminders));
    renderRem();
}

function renderRem(){
    let ul=document.getElementById("remList");
    ul.innerHTML="";
    reminders.forEach(r=>{
        let li=document.createElement("li");
        li.textContent=r.text;
        ul.appendChild(li);
    });
}

setInterval(()=>{
    let now=Date.now();
    reminders.forEach(r=>{
        if(now>=r.time && !r.shown){
            if(Notification.permission==="granted"){
                new Notification("Podsjetnik",{body:r.text});
            }
            alert("Podsjetnik: "+r.text);
            r.shown=true;
        }
    });
    localStorage.setItem("rem",JSON.stringify(reminders));
},1000);

/* INIT */
renderTasks();
renderCal();
renderRem();

</script>

</body>
</html>
