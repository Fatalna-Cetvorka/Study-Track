<!DOCTYPE html>

<html lang="bs">
<head>
<meta charset="UTF-8">
<title>StudyTrack PRO</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1e3c;
    color: white;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

.container {
    width: 350px;
    background: #122b50;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

.input-section {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input {
    flex: 1;
    padding: 8px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 8px;
    background: #2ecc71;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: #1c3b6e;
    margin: 5px 0;
    padding: 10px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

li.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

.stats {
    margin-top: 15px;
    text-align: center;
}

.small {
    font-size: 12px;
    opacity: 0.7;
}

.delete-btn {
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    padding: 5px;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="container">
    <h1>StudyTrack PRO</h1>
    <p>Organizuj svoje zadatke</p>

```
<div class="input-section">
    <input type="text" id="taskInput" placeholder="Unesi zadatak..." onkeypress="if(event.key==='Enter') addTask()">
    <input type="date" id="taskDate">
    <button onclick="addTask()">Dodaj</button>
</div>

<ul id="taskList"></ul>

<div class="stats">
    Završeno: <span id="completed">0</span> /
    Ukupno: <span id="total">0</span>
    <br>
    📊 Napredak: <span id="progress">0%</span>
</div>
```

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function addTask() {
    const input = document.getElementById("taskInput");
    const dateInput = document.getElementById("taskDate");

    const text = input.value.trim();
    const date = dateInput.value;

    if (text === "") return;

    tasks.push({ text: text, done: false, date: date });

    input.value = "";
    dateInput.value = "";

    renderTasks();
}

function toggleTask(index) {
    tasks[index].done = !tasks[index].done;
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    renderTasks();
}

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    let completed = 0;

    tasks.forEach((task, index) => {
        const li = document.createElement("li");

        const left = document.createElement("div");
        left.innerHTML = task.text + (task.date ? "<br><span class='small'>📅 " + task.date + "</span>" : "");

        if (task.done) {
            li.classList.add("completed");
            completed++;
        }

        li.onclick = () => toggleTask(index);

        const btn = document.createElement("button");
        btn.textContent = "❌";
        btn.className = "delete-btn";

        btn.onclick = (e) => {
            e.stopPropagation();
            deleteTask(index);
        };

        li.appendChild(left);
        li.appendChild(btn);

        list.appendChild(li);
    });

    document.getElementById("completed").textContent = completed;
    document.getElementById("total").textContent = tasks.length;

    let percent = tasks.length === 0 ? 0 : Math.round((completed / tasks.length) * 100);
    document.getElementById("progress").textContent = percent + "%";

    localStorage.setItem("tasks", JSON.stringify(tasks));
}
</script>

</body>
</html>
